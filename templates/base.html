<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kinetic AI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; color: #0F172A; }
        .premium-card { background: white; border: 1px solid #F1F5F9; transition: all 0.3s ease; }
        .sidebar-link { transition: all 0.2s ease; display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; color: #94A3B8; }
        .sidebar-link:hover { background: #1E293B; color: white; }
        .active-link { background: #4F46E5 !important; color: white !important; font-weight: 700; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-[#0F172A] text-white flex flex-col sticky top-0 h-screen z-50">
        <div class="h-20 flex items-center px-6 border-b border-slate-800">
            <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center mr-3">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7"/></svg>
            </div>
            <span class="text-lg font-bold tracking-tight">Kinetic AI</span>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-1">
            <p class="px-4 text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-4">Workspace</p>
            
            <a href="/dashboard" class="sidebar-link {% if request.path == '/dashboard' %}active-link{% endif %}">
                Dashboard
            </a>

            <p class="px-4 pt-6 text-[10px] font-bold uppercase tracking-widest text-slate-500 mb-4">AI Engines</p>
            
            <a href="/enhancer" class="sidebar-link {% if request.path == '/enhancer' %}active-link{% endif %}">
                Prompt Enhancer
            </a>
            <a href="/blogger" class="sidebar-link {% if request.path == '/blogger' %}active-link{% endif %}">
                Blog Writer
            </a>
            <a href="/rewriter" class="sidebar-link {% if request.path == '/rewriter' %}active-link{% endif %}">
                AI Rewriter
            </a>
            <a href="/caption" class="sidebar-link {% if request.path == '/caption' %}active-link{% endif %}">
                Caption Generator
            </a>
            <a href="/ad-writer" class="sidebar-link {% if request.path == '/ad-writer' %}active-link{% endif %}">
                Ad Copywriter
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between">
            <h1 class="font-bold text-slate-800 text-lg">{% block tool_name %}Dashboard{% endblock %}</h1>
            <div class="flex items-center gap-4">
                <a href="/" class="text-sm font-semibold text-slate-400 hover:text-indigo-600 transition">Back Home</a>
                <div class="w-10 h-10 rounded-full bg-slate-100 border border-slate-200"></div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
